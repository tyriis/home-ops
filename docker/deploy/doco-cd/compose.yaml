---
volumes:
  data:
    external: ${VOLUME_EXTERNAL:-false}
    name: ${VOLUME_NAME:-doco-cd_data}
    driver: ${VOLUME_DRIVER:-local}

configs:
  poll-config.yml:
    # file: /etc/doco-cd/poll-config.yml # uncomment for synology as it does not support config.content
    content: |
      - url: https://github.com/tyriis/home-ops.git
        target: ${TARGET}
        interval: 180
#       # - url: https://github.com/user/repo.git
#       #   run_once: true
secrets:
  sops_age_key:
    file: ${SOPS_AGE_KEY_FILE:-/etc/doco-cd/age-keys.txt}
  webhook_secret:
    file: ${WEBHOOK_SECRET_FILE:-/etc/doco-cd/webhook_secret}
services:
  doco-cd:
    scale: 1 # scale to 0 if you want to stop the service without losing data
    configs:
      - source: poll-config.yml
        target: /poll-config.yml
    container_name: ${CONTAINER_NAME:-doco-cd}
    environment:
      HTTP_PORT: ${HTTP_PORT:-8080}
      LOG_LEVEL: debug
      POLL_CONFIG_FILE: /poll-config.yml
      WEBHOOK_SECRET_FILE: /run/secrets/webhook_secret
      SOPS_AGE_KEY_FILE: /run/secrets/sops_age_key
      DEPLOY_CONFIG_BASE_DIR: ./docker
    healthcheck:
      test:
        - CMD
        - /doco-cd
        - healthcheck
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
    image: ghcr.io/kimdre/doco-cd:0.73.1@sha256:a8ab07acc93e18d042794a3186add6477694683386b65376ba5d20f71fa66d85
    ports:
      - ${HTTP_PORT:-8080}:${HTTP_PORT:-8080}
    restart: unless-stopped
    secrets:
      - webhook_secret
      - sops_age_key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
