---
volumes:
  data:
    external: false
    name: ollama_data
    driver: local
services:
  ollama:
    scale: 1 # scale to 0 if you want to stop the service without losing data
    container_name: ollama
    environment:
      OLLAMA_MODELS: /data/.ollama/models
      # OLLAMA_KEEP_ALIVE: 24h
    # healthcheck:
    #   test:
    #     - CMD
    #     - curl
    #     - -f
    #     - http://localhost:11434/v1/models
    #   start_period: 15s
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    image: ollama/ollama:0.20.3@sha256:87d71eb588a28c747094ca5d011392a3790f6ea9bd9c87594780ad7c65cc7ed1
    ports:
      - 11434:11434
    restart: unless-stopped
    volumes:
      - data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

