---
services:
  minio:
    cap_drop:
      - ALL
    command:
      - server
      - /data
      - --console-address
      - :${CONSOLE_PORT:-9001}
    container_name: ${CONTAINER_NAME:-minio}
    image: pgsty/minio:RELEASE.2026-02-14T12-00-00Z@sha256:00c404465c4e7c4fd716d98caec2928e9e0f82c3548615662fdd3866ea9a28c0
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
      # MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-}
      # MINIO_SERVER_URL: ${MINIO_SERVER_URL:-}
    healthcheck:
      test:
        - CMD
        - /data/mc
        - ready
        - local
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - ${API_PORT:-9000}:9000
      - ${CONSOLE_PORT:-9001}:9001
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    user: ${USER_ID:-0}:${GROUP_ID:-0}
    volumes:
      - ${DATA_PATH:-./data}:/data
