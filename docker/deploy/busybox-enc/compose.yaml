---
services:
  busybox-enc:
    scale: 1
    container_name: busybox-enc
    image: busybox:1.37.0@sha256:0d3f1e630be52ade0c06107515937607be2cab11a2ad2122099fc79e19bcc18b
    env_file:
      - ${SOPS_ENV_FILE:-sops.env}
    command:
      - sh
      - -c
      - |
        echo "hello from doco-cd target=${TARGET:-undefined}"
        echo "decrypted secret value: $${DEMO_SECRET}"
        sleep 3600
    restart: unless-stopped
