---
services:
  busybox-enc:
    scale: 1
    container_name: busybox-enc
    image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
    env_file:
      - ${SOPS_ENV_FILE:-sops.env}
    command:
      - sh
      - -c
      - |
        echo "hello from doco-cd target=${TARGET:-undefined}"
        echo "decrypted secret value: $${DEMO_SECRET}"
        sleep 3600
    restart: unless-stopped
