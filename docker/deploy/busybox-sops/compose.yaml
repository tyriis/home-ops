    image: busybox:1.37.0@sha256:e3652a00a2fabd16ce889f0aa32c38eec347b997e73bd09e69c962ec7f8732ee
    # env_file:
    #   - secrets.enc.env
    command:
      - sh
      - -c
      - |
        echo "hello from doco-cd target=red"
        echo "decrypted secret value: $${DEMO_SECRET}"
        sleep 3600
    restart: unless-stopped
