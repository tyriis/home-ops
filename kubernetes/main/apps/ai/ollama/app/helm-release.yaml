---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  driftDetection:
    mode: enabled
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      createDefaultServiceAccount: false
    # https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
    controllers:
      main:
        replicas: 1 # Single node
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.31.1@sha256:f1a705f2bd113fb8d15f85f7c217f0dc5f6bebda6b0cc42b82c3ad165ffcb9dc
            securityContext:
              privileged: true # Needed for iGPU device access
            env:
              OLLAMA_MODELS: &modelPath /models
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_NUM_PARALLEL: 1
              OLLAMA_CONTEXT_LENGTH: 8192
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_MAX_QUEUE: 8
              # OLLAMA_INTEL_GPU: 1
              OLLAMA_KEEP_ALIVE: 30m
              OLLAMA_VULKAN: 1
              OLLAMA_NO_CLOUD: 1
              OLLAMA_FLASH_ATTENTION: 1
            resources:
              requests:
                cpu: 2
                memory: 8Gi
                gpu.intel.com/i915: 1
              limits:
                cpu: 12
                memory: 24Gi
                gpu.intel.com/i915: 1
            ports:
              - name: http
                containerPort: &port 11434
                protocol: TCP

          exporter:
            image:
              repository: lucabecker42/ollama-exporter
              tag: 1.0.2@sha256:70d3999cbfdaf5f7575495afd165ac30243252092ea56030c2a3ec1f7373f34a
    service:
      app:
        ports:
          http:
            port: *port
          metrics:
            port: 8000
    route:
      app:
        annotations:
          external-dns/unifi: "true"
        hostnames:
          - "{{ .Release.Name }}.techtales.io"
        parentRefs:
          - name: envoy
            namespace: networking
            sectionName: https
    persistence:
      data:
        existingClaim: ollama-data
        globalMounts:
          - path: *modelPath
            subPath: models
          - path: /root/.ollama
            subPath: config
      dri:
        type: hostPath
        hostPath: /dev/dri
