---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  driftDetection:
    mode: enabled
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      createDefaultServiceAccount: false
    # https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
    controllers:
      main:
        replicas: 1 # Single node
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.23.3@sha256:9b519ed11930ba9a3c6123f8546b8f553e247ea6ce58739a4878f913996e7a67
            securityContext:
              privileged: true # Needed for iGPU device access
            env:
              OLLAMA_MODELS: &modelPath /models
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_NUM_PARALLEL: 1
              # OLLAMA_CONTEXT_LENGTH: 32768
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 0
              OLLAMA_KEEP_ALIVE: 30m
              # OLLAMA_INTEL_GPU: "true"
              # OLLAMA_NUM_GPU: "999"
              # DEVICE: iGPU
              # ZES_ENABLE_SYSMAN: "1"
              no_proxy: localhost,127.0.0.1
            resources:
              requests:
                cpu: 2
                memory: 8Gi
              limits:
                cpu: 12
                memory: 24Gi
            ports:
              - name: http
                containerPort: &port 11434
                protocol: TCP

          exporter:
            image:
              repository: lucabecker42/ollama-exporter
              tag: 1.0.1@sha256:4d1d96fae76dbefd6b763d576a12fb9799913ae9a585990a464eacab2b600f55
    service:
      app:
        ports:
          http:
            port: *port
          metrics:
            port: 8000
    route:
      app:
        annotations:
          external-dns/unifi: "true"
        hostnames:
          - "{{ .Release.Name }}.techtales.io"
        parentRefs:
          - name: envoy
            namespace: networking
            sectionName: https
    persistence:
      data:
        existingClaim: ollama-data
        globalMounts:
          - path: *modelPath
            subPath: models
          - path: /root/.ollama
            subPath: config
      dri:
        type: hostPath
        hostPath: /dev/dri
