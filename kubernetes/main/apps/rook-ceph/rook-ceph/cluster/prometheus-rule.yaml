---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rook-ceph-cluster-mtu-override
  namespace: rook-ceph
spec:
  groups:
    - name: rook-ceph-mtu-override
      interval: 30s
      rules:
        # Override Rook-Ceph's CephInconsistentMTU alert
        # This is expected in heterogeneous networks with different interface types (1500, 9000, 65520 MTU)
        # Alert definition from rook-ceph is suppressed by this rule that always evaluates to false
        - alert: CephInconsistentMTU
          expr: vector(0) > 0
          annotations:
            summary: "Suppressed: MTU settings are intentionally different across Ceph hosts"
            description: This alert is disabled because MTU inconsistency is expected with multiple interface types
