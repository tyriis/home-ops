---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-exporter-rules
spec:
  groups:
    - name: node-exporter.rules
      rules:
        - alert: HostOutOfMemory
          annotations:
            summary: "Host out of memory (instance {{ $labels.instance }})"
            description: "Node memory is filling up (< 10% left)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
          for: 5m
          labels:
            severity: warning
        - alert: HostMemoryUnderMemoryPressure
          annotations:
            summary: "Host memory under memory pressure (instance {{ $labels.instance }})"
            description: "The node is under heavy memory pressure. High rate of major page faults\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            rate(node_vmstat_pgmajfault[1m]) > 1000
          for: 5m
          labels:
            severity: warning
        - alert: HostUnusualNetworkThroughputIn
          annotations:
            summary: "Host unusual network throughput in (instance {{ $labels.instance }})"
            description: "Host network interfaces are probably receiving too much data (> 100 MB/s)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            sum by (instance) (irate(node_network_receive_bytes_total[2m])) / 1024 / 1024 > 200
          for: 5m
          labels:
            severity: warning
        - alert: HostUnusualNetworkThroughputOut
          annotations:
            summary: "Host unusual network throughput out (instance {{ $labels.instance }})"
            description: "Host network interfaces are probably sending too much data (> 100 MB/s)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            sum by (instance) (irate(node_network_transmit_bytes_total[2m])) / 1024 / 1024 > 200
          for: 5m
          labels:
            severity: warning
        - alert: HostOutOfDiskSpace
          annotations:
            summary: "Host out of disk space (instance {{ $labels.instance }})"
            description: "Disk is almost full (< 10% left)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            (node_filesystem_avail_bytes{mountpoint="/rootfs"}  * 100) / node_filesystem_size_bytes{mountpoint="/rootfs"} < 10
          for: 5m
          labels:
            severity: warning
        - alert: HostDiskWillFillIn4Hours
          annotations:
            summary: "Host disk will fill in 4 hours (instance {{ $labels.instance }})"
            description: "Disk will fill in 4 hours at current write rate\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            predict_linear(node_filesystem_free_bytes{fstype!~"tmpfs"}[1h], 4 * 3600) < 0
          for: 5m
          labels:
            severity: warning
        - alert: HostOutOfInodes
          annotations:
            summary: "Host out of inodes (instance {{ $labels.instance }})"
            description: "Disk is almost running out of available inodes (< 10% left)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_filesystem_files_free{mountpoint ="/rootfs"} / node_filesystem_files{mountpoint ="/rootfs"} * 100 < 10
          for: 5m
          labels:
            severity: warning
        - alert: HostUnusualDiskReadLatency
          annotations:
            summary: "Host unusual disk read latency (instance {{ $labels.instance }})"
            description: "Disk latency is growing (read operations > 100ms)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            rate(node_disk_read_time_seconds_total[1m]) / rate(node_disk_reads_completed_total[1m]) > 100
          for: 5m
          labels:
            severity: warning
        - alert: HostUnusualDiskWriteLatency
          annotations:
            summary: "Host unusual disk write latency (instance {{ $labels.instance }})"
            description: "Disk latency is growing (write operations > 100ms)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            rate(node_disk_write_time_seconds_total[1m]) / rate(node_disk_writes_completed_total[1m]) > 100
          for: 5m
          labels:
            severity: warning
        - alert: HostHighCpuLoad
          annotations:
            summary: "Host high CPU load (instance {{ $labels.instance }})"
            description: "CPU load is > 80%\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 5m
          labels:
            severity: warning
        - alert: HostSwapIsFillingUp
          annotations:
            summary: "Host swap is filling up (instance {{ $labels.instance }})"
            description: "Swap is filling up (>80%)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) * 100 > 80
          for: 5m
          labels:
            severity: warning
        - alert: HostSystemdServiceCrashed
          annotations:
            summary: "Host SystemD service crashed (instance {{ $labels.instance }})"
            description: "SystemD service crashed\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_systemd_unit_state{state="failed"} == 1
          for: 5m
          labels:
            severity: warning
        - alert: HostPhysicalComponentTooHot
          annotations:
            summary: "Host physical component too hot (instance {{ $labels.instance }})"
            description: "Physical hardware component too hot\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_hwmon_temp_celsius > 75
          for: 5m
          labels:
            severity: warning
        - alert: HostNodeOvertemperatureAlarm
          annotations:
            summary: "Host node overtemperature alarm (instance {{ $labels.instance }})"
            description: "Physical node temperature alarm triggered\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_hwmon_temp_alarm == 1
          for: 5m
          labels:
            severity: critical
        - alert: HostRaidArrayGotInactive
          annotations:
            summary: "Host RAID array got inactive (instance {{ $labels.instance }})"
            description: "RAID array {{ $labels.device }} is in degraded state due to one or more disks failures. Number of spare drives is insufficient to fix issue automatically.\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_md_state{state="inactive"} > 0
          for: 5m
          labels:
            severity: critical
        - alert: HostRaidDiskFailure
          annotations:
            summary: "Host RAID disk failure (instance {{ $labels.instance }})"
            description: "At least one device in RAID array on {{ $labels.instance }} failed. Array {{ $labels.md_device }} needs attention and possibly a disk swap\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_md_disks{state="fail"} > 0
          for: 5m
          labels:
            severity: warning
        - alert: HostOomKillDetected
          annotations:
            summary: "Host OOM kill detected (instance {{ $labels.instance }})"
            description: "OOM kill detected\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            increase(node_vmstat_oom_kill[5m]) > 0
          for: 5m
          labels:
            severity: warning
        - alert: HostEdacCorrectableErrorsDetected
          annotations:
            summary: "Host EDAC Correctable Errors detected (instance {{ $labels.instance }})"
            description: "{{ $labels.instance }} has had {{ printf \"%.0f\" $value }} correctable memory errors reported by EDAC in the last 5 minutes.\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            increase(node_edac_correctable_errors_total[5m]) > 0
          for: 5m
          labels:
            severity: info
        - alert: HostEdacUncorrectableErrorsDetected
          annotations:
            summary: "Host EDAC Uncorrectable Errors detected (instance {{ $labels.instance }})"
            description: "{{ $labels.instance }} has had {{ printf \"%.0f\" $value }} uncorrectable memory errors reported by EDAC in the last 5 minutes.\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_edac_uncorrectable_errors_total > 0
          for: 5m
          labels:
            severity: warning
        - alert: HostNetworkReceiveErrors
          annotations:
            summary: "Host Network Receive Errors (instance {{ $labels.instance }})"
            description: "{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf \"%.0f\" $value }} receive errors in the last five minutes.\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            increase(node_network_receive_errs_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
        - alert: HostNetworkTransmitErrors
          annotations:
            summary: "Host Network Transmit Errors (instance {{ $labels.instance }})"
            description: "{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf \"%.0f\" $value }} transmit errors in the last five minutes.\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            increase(node_network_transmit_errs_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
        # Disk I/O - Unusual read rate from https://devconnected.com/monitoring-disk-i-o-on-linux-with-the-node-exporter/
        - alert: UnusualDiskReadRate
          annotations:
            summary: "Unusual disk read rate (instance {{ $labels.instance }})"
            description: "Disk is probably reading too much data (> 50 MB/s)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            sum by (instance) (irate(node_disk_read_bytes_total[2m])) / 1024 / 1024 > 50
          for: 30m
          labels:
            severity: warning
        # Disk I/O - Unusual write rate from https://devconnected.com/monitoring-disk-i-o-on-linux-with-the-node-exporter/
        - alert: UnusualDiskWriteRate
          annotations:
            summary: "Unusual disk write rate (instance {{ $labels.instance }})"
            description: "Disk is probably writing too much data (> 50 MB/s)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            sum by (instance) (irate(node_disk_written_bytes_total[2m])) / 1024 / 1024 > 50
          for: 30m
          labels:
            severity: warning
        # Disk I/O - Out Of Disk Space from https://devconnected.com/monitoring-disk-i-o-on-linux-with-the-node-exporter/
        - alert: OutOfDiskSpace
          annotations:
            summary: "Out of disk space (instance {{ $labels.instance }})"
            description: "Disk is almost full (< 10% left)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            node_filesystem_free_bytes{mountpoint ="/rootfs"} / node_filesystem_size_bytes{mountpoint ="/rootfs"} * 100 < 10
          for: 30m
          labels:
            severity: warning
        # Disk I/O - Unusual disk read latency from https://devconnected.com/monitoring-disk-i-o-on-linux-with-the-node-exporter/
        - alert: UnusualDiskReadLatency
          annotations:
            summary: "Unusual disk read latency (instance {{ $labels.instance }})"
            description: "Disk latency is growing (read operations > 100ms)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            rate(node_disk_read_time_seconds_total[1m]) / rate(node_disk_reads_completed_total[1m]) > 100
          for: 30m
          labels:
            severity: warning
        # Disk I/O - Time is high
        - alert: HighDiskIOTime
          annotations:
            summary: "High Disk I/O Time (instance {{ $labels.instance }}, device {{ $labels.device }} )"
            description: "Disk I/O Time has a critical level, node operation at risk\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            rate(node_disk_io_time_seconds_total{job="node-exporter", device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|dasd.+)"}[1m]) > 0.2
          for: 10m
          labels:
            severity: critical
        - alert: UnusualDiskReadRate
          annotations:
            summary: "Unusual disk read rate (instance {{ $labels.instance }})"
            description: "Disk is probably reading too much data (> 50 MB/s)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            sum by (instance) (irate(node_disk_read_bytes_total[2m])) / 1024 / 1024 > 50
          for: 30m
          labels:
            severity: warning
        # Disk I/O - Unusual write rate from https://devconnected.com/monitoring-disk-i-o-on-linux-with-the-node-exporter/
        - alert: UnusualDiskWriteRate
          annotations:
            summary: "Unusual disk write rate (instance {{ $labels.instance }})"
            description: "Disk is probably writing too much data (> 50 MB/s)\n  VALUE = {{ $value }}\n  LABELS: {{ $labels }}"
          expr: |-
            sum by (instance) (irate(node_disk_written_bytes_total[2m])) / 1024 / 1024 > 50
          for: 30m
          labels:
            severity: warning
