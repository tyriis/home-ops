---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name firecrawl-env
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        BULL_AUTH_KEY: "{{ .BULL_AUTH_KEY }}"
        NUQ_DATABASE_URL: "postgresql://{{ .NUQ_DB_USER }}:{{ .NUQ_DB_PASS }}@firecrawl-nuq-postgres.firecrawl-system.svc.cluster.local:5432/postgres"
        # OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        # SLACK_WEBHOOK_URL: "{{ .SLACK_WEBHOOK_URL }}"
  dataFrom:
    - extract:
        key: infra/kubernetes/main/firecrawl-system/firecrawl #gitleaks:allow
