---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/networkpolicy.json
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dragonfly-allow-metrics
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dragonfly
  policyTypes:
    - Ingress
  ingress:
    # Allow dragonfly-operator to perform health checks on port 9999
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: dragonfly-operator
      ports:
        - protocol: TCP
          port: 9999
