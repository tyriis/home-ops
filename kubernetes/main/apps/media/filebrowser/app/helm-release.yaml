---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app filebrowser
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # https://filebrowserquantum.com/en/docs/
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: gtstef/filebrowser
              tag: 1.3.0-stable-slim@sha256:8e6f7d32f5f0b7a40cb3a80197ef27088f01828a132f5bfed337d77b10e0f1e2
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
              runAsUser: 1000
              runAsGroup: 1000
            ports:
              - containerPort: 8080
                name: http
                protocol: TCP
            env:
              FILEBROWSER_CONFIG: /config/config.yaml
              # FILEBROWSER_SERVER_DATABASE: /data/filebrowser.db
              # FILEBROWSER_SERVER_PORT: 8080
            envFrom:
              - secretRef:
                  name: filebrowser-env
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      *app :
        type: ClusterIP
        ports:
          http:
            port: 8080
    route:
      *app :
        annotations:
          external-dns/unifi: "true"
        hostnames:
          - files.techtales.io
        parentRefs:
          - name: envoy
            namespace: networking
            sectionName: https
    persistence:
      media:
        type: nfs
        server: nas.techtales.io
        path: /mnt/tank/media
        globalMounts:
          - path: /mnt/media
      public:
        type: nfs
        server: nas.techtales.io
        path: /mnt/tank/public
        globalMounts:
          - path: /mnt/public
      home:
        type: nfs
        server: nas.techtales.io
        path: /mnt/tank/home
        globalMounts:
          - path: /mnt/home
      fotos:
        type: nfs
        server: nas.techtales.io
        path: /mnt/tank/fotos
        globalMounts:
          - path: /mnt/fotos
      config:
        type: configMap
        name: filebrowser-config
        advancedMounts:
          *app :
            app:
              - path: /config/config.yaml
                subPath: config.yaml
                readOnly: true
      data:
        existingClaim: ${APP}-data
