---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ${APP}
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      hermes:
        forceRename: *app
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: docker.io/library/alpine
              tag: "3.24@sha256:660e0827bd401543d81323d4886abbd08fda0fe3ba84337837d0b11a67251283"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
        containers:
          app:
            command: ["hermes"]
            args: ["gateway", "run", "--no-supervise"]
            image: &image
              repository: harbor.techtales.io/main/hermes-agent
              tag: v2026.6.5@sha256:6128fd61d66e4cece69f50b5fb407b45f2286dd5e5ae29528bf128a1cf32681e
            ports:
              - name: api
                containerPort: 8642
                protocol: TCP
            env:
              S6_KEEP_ENV: "1"
              S6_READ_ONLY_ROOT: "1"
              API_SERVER_PORT: "8642"
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              # API_SERVER_MODEL_NAME: "${APP}"
              HOME: &home /opt/data
              HERMES_HOME: *home
            envFrom:
              - secretRef:
                  name: ${APP}-secret
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8642
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8642
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - SETUID
                  - SETGID
                  - CHOWN
                  - DAC_OVERRIDE
            resources: &resources
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
          dashboard:
            image: *image
            command: ["hermes"]
            args: ["dashboard", "--host", "0.0.0.0", "--insecure"]
            ports:
              - name: dashboard
                containerPort: 9119
                protocol: TCP
            env:
              HOME: *home
              HERMES_HOME: *home
              GATEWAY_HEALTH_URL: "http://localhost:8642"
            envFrom:
              - secretRef:
                  name: ${APP}-secret
            securityContext: *securityContext
            resources: *resources
    service:
      app:
        forceRename: *app
        primary: true
        controller: hermes
        ports:
          api:
            port: 8642
          dashboard:
            port: 9119
    persistence:
      configmap:
        type: configMap
        name: ${APP}-config
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
      data:
        existingClaim: ${APP}-data
        advancedMounts:
          hermes:
            app:
              - path: *home
            dashboard:
              - path: *home
            init-config:
              - path: *home
      run:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /run
      run-dashboard:
        type: emptyDir
        advancedMounts:
          hermes:
            dashboard:
              - path: /run
      tmp:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /tmp
      tmp-dashboard:
        type: emptyDir
        advancedMounts:
          hermes:
            dashboard:
              - path: /tmp
