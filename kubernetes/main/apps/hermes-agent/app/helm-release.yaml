---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ${APP}
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      hermes:
        forceRename: *app
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            args: ["gateway", "run"]
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.16@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
            ports:
              - name: api
                containerPort: 8642
                protocol: TCP
              - name: dashboard
                containerPort: 9119
                protocol: TCP
            env:
              API_SERVER_PORT: "8642"
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              # API_SERVER_MODEL_NAME: "${APP}"
              HERMES_DASHBOARD: "1"
              HERMES_HOME: &home /opt/data
            envFrom:
              - secretRef:
                  name: ${APP}-secret
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 9119
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    service:
      app:
        forceRename: *app
        primary: true
        controller: hermes
        ports:
          api:
            port: 8642
          dashboard:
            port: 9119
    persistence:
      data:
        existingClaim: ${APP}-data
        advancedMounts:
          hermes:
            app:
              - path: *home
      tmp:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /tmp
