---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ${APP}
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      hermes:
        forceRename: *app
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: docker.io/library/alpine
              tag: "3.24@sha256:a2d49ea686c2adfe3c992e47dc3b5e7fa6e6b5055609400dc2acaeb241c829f4"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
          init-agent-src:
            image:
              repository: harbor.techtales.io/main/hermes-agent
              tag: v2026.6.5@sha256:6128fd61d66e4cece69f50b5fb407b45f2286dd5e5ae29528bf128a1cf32681e
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp -r /opt/hermes/. /tmp/agent-src/
                chmod -R 755 /tmp/agent-src
        containers:
          app:
            command: ["hermes"]
            args: ["gateway", "run", "--no-supervise"]
            image: &image
              repository: harbor.techtales.io/main/hermes-agent
              tag: v2026.6.5@sha256:6128fd61d66e4cece69f50b5fb407b45f2286dd5e5ae29528bf128a1cf32681e
            ports:
              - name: api
                containerPort: 8642
                protocol: TCP
            env:
              S6_KEEP_ENV: "1"
              S6_READ_ONLY_ROOT: "1"
              API_SERVER_PORT: "8642"
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              # API_SERVER_MODEL_NAME: "${APP}"
              HOME: &home /opt/data
              HERMES_HOME: *home
              FIRECRAWL_API_URL: http://192.168.1.244:3002 #NOSONAR allow http
            envFrom:
              - secretRef:
                  name: ${APP}-secret
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8642
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8642
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - SETUID
                  - SETGID
                  - CHOWN
                  - DAC_OVERRIDE
            resources: &resources
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
          dashboard:
            image: *image
            command: ["hermes"]
            args: ["dashboard", "--host", "0.0.0.0", "--insecure"]
            ports:
              - name: dashboard
                containerPort: 9119
                protocol: TCP
            env:
              HOME: *home
              HERMES_HOME: *home
              GATEWAY_HEALTH_URL: "http://localhost:8642"
            envFrom:
              - secretRef:
                  name: ${APP}-secret
            securityContext: *securityContext
            resources: *resources
          webui:
            image:
              repository: ghcr.io/nesquena/hermes-webui
              tag: 0.51.419@sha256:19eac8b130e3a7e280941db747ccc76b8d646f990fc714065430dadaabff445a
            command: ["/bin/sh", "-c"]
            args:
              - test -d /opt/data/webui-venv || uv venv /opt/data/webui-venv && uv pip install --python /opt/data/webui-venv/bin/python --no-cache -r /apptoo/requirements.txt && uv pip install --python /opt/data/webui-venv/bin/python --no-cache /tmp/agent-src && /opt/data/webui-venv/bin/python3 /apptoo/server.py
            ports:
              - name: webui
                containerPort: 8787
                protocol: TCP
            env:
              HERMES_WEBUI_HOST: "0.0.0.0"
              HERMES_WEBUI_PORT: "8787"
              HERMES_WEBUI_CHAT_BACKEND: "gateway"
              HERMES_WEBUI_GATEWAY_BASE_URL: "http://localhost:8642"
              HERMES_WEBUI_AGENT_DIR: /tmp/agent-src
              HERMES_WEBUI_BOT_NAME: "${AGENT_NAME}"
              HERMES_WEBUI_PASSKEY: "1"
              HOME: *home
              HERMES_WEBUI_STATE_DIR: /opt/data/webui
            envFrom:
              - secretRef:
                  name: ${APP}-secret
            probes:
              liveness: &webuiProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8787
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *webuiProbes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8787
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - DAC_OVERRIDE
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        forceRename: *app
        primary: true
        controller: hermes
        ports:
          api:
            port: 8642
          dashboard:
            port: 9119
          webui:
            port: 8787
            primary: true
    route:
      webui:
        annotations:
          external-dns/unifi: "true"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: Hermes WebUI Chat
          gethomepage.dev/group: AI
          gethomepage.dev/icon: mdi-chat
          gethomepage.dev/name: Hermes WebUI
          gatus.home-operations.com/endpoint: |
            group: external
        hostnames:
          - "${AGENT_NAME}.techtales.io"
        parentRefs:
          - name: envoy
            namespace: networking
            sectionName: https
    persistence:
      configmap:
        type: configMap
        name: ${APP}-config
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
      data:
        existingClaim: ${APP}-data
        advancedMounts:
          hermes:
            app:
              - path: *home
            dashboard:
              - path: *home
            init-config:
              - path: *home
            webui:
              - path: *home
      run:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /run
            webui:
              - path: /run
      run-dashboard:
        type: emptyDir
        advancedMounts:
          hermes:
            dashboard:
              - path: /run
      tmp:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /tmp
            webui:
              - path: /tmp
      agent-src:
        type: emptyDir
        advancedMounts:
          hermes:
            init-agent-src:
              - path: /tmp/agent-src
            webui:
              - path: /tmp/agent-src
      tmp-dashboard:
        type: emptyDir
        advancedMounts:
          hermes:
            dashboard:
              - path: /tmp
