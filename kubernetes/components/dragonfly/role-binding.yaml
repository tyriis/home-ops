---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/rolebinding.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dragonfly-operator-write
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dragonfly-operator-write
subjects:
  - kind: ServiceAccount
    name: dragonfly-operator
    namespace: dragonfly-system
