---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pocket-id
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
    controllers:
      pocket-id:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        initContainers:
          litestream-restore:
            image:
              repository: litestream/litestream
              tag: 0.5.10@sha256:66c0ef32779b20f7ce682751ec50ba0f1363cad5cb9dba1e23fbeee6ae3197b9
            args:
              - restore
              - -if-db-not-exists
              - -if-replica-exists
              - /app/data/pocket-id.db
            envFrom:
              - secretRef:
                  name: pocket-id-litestream
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
          litestream:
            image:
              repository: litestream/litestream
              tag: 0.5.10@sha256:66c0ef32779b20f7ce682751ec50ba0f1363cad5cb9dba1e23fbeee6ae3197b9
            args:
              - replicate
            restartPolicy: Always
            envFrom:
              - secretRef:
                  name: pocket-id-litestream
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
        containers:
          app:
            image:
              repository: ghcr.io/pocket-id/pocket-id
              tag: v2.5.0@sha256:1549f31f76a6c158af0056a4f2c62a590627886a84e9da9bda76eb1e142a449a
            env:
              # https://pocket-id.org/docs/configuration/environment-variables
              ANALYTICS_DISABLED: "true"
              APP_URL: https://id.techtales.io
              EMAILS_VERIFIED: "true"
              FILE_BACKEND: database
              LOG_LEVEL: info
              LOG_JSON: "true"
              METRICS_ENABLED: "true"
              OTEL_METRICS_EXPORTER: prometheus
              OTEL_EXPORTER_PROMETHEUS_HOST: 0.0.0.0
              TRACING_ENABLED: "false"
            envFrom:
              - secretRef:
                  name: pocket-id-encryption
            ports:
              - name: http
                containerPort: &port 1411
              - name: metrics
                containerPort: &metricsPort 9464
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
          metrics:
            port: *metricsPort
    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    route:
      app:
        annotations:
          external-dns/unifi: "true"
        hostnames:
          - id.techtales.io
        parentRefs:
          - name: envoy
            namespace: networking
            sectionName: https
    persistence:
      backup:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: nfs-truenas
        size: 10Gi
      data:
        type: emptyDir
        globalMounts:
          - path: /app/data
      litestream-config:
        type: configMap
        name: pocket-id-litestream-config
        advancedMounts:
          pocket-id:
            litestream:
              - path: /etc/litestream.yml
                subPath: litestream.yml
                readOnly: true
            litestream-restore:
              - path: /etc/litestream.yml
                subPath: litestream.yml
                readOnly: true
