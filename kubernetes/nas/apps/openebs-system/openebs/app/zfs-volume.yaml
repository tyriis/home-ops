---
apiVersion: zfs.openebs.io/v1
kind: ZFSVolume
metadata:
  name: minio-replication
spec:
  capacity: 450G
  fsType: zfs
  recordsize: 128k
  compression: lz4
  ownerNodeID: nas01
  poolName: glacier
  volumeType: DATASET
  shared: "yes"
  thinProvision: "yes"

---
apiVersion: zfs.openebs.io/v1
kind: ZFSVolume
metadata:
  name: backup
spec:
  capacity: 450G
  fsType: zfs
  recordsize: 128k
  compression: lz4
  ownerNodeID: nas01
  poolName: glacier
  volumeType: DATASET
  shared: "yes"
  thinProvision: "yes"
